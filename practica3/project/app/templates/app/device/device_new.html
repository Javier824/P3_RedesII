{% extends 'app/base.html' %}

{% block content %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{% url 'app:devices' %}">Dispositivos</a></li>
    <li class="breadcrumb-item active" aria-current="page">Añadir Dispositivo</li>
  </ol>
</nav>

<h2><i class="bi-plus-circle mr-2"></i>Añadir Nuevo Dispositivo</h2>
<p class="text-muted">Selecciona el tipo de dispositivo que deseas configurar:</p>

<div class="list-group mt-4 shadow-sm" style="max-width: 400px;">
    <a href="{% url 'app:device_new_sensor' %}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
        <span><i class="bi-thermometer-half mr-2"></i> Sensor</span>
        <i class="bi-chevron-right text-muted"></i>
    </a>
    
    <a href="{% url 'app:device_new_switch' %}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
        <span><i class="bi-toggle-on mr-2"></i> Switch</span>
        <i class="bi-chevron-right text-muted"></i>
    </a>
    
    <a href="{% url 'app:device_new_clock' %}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
        <span><i class="bi-clock mr-2"></i> Clock</span>
        <i class="bi-chevron-right text-muted"></i>
    </a>
</div>

<div class="mt-4 pt-3">
    <a class="btn btn-secondary" href="{% url 'app:devices' %}">
        Cancelar
    </a>
</div>
{% endblock %}
